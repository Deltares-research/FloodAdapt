name: Lint and Test

on:
  push:
    branches:
      - setup_automated_testing
  workflow_dispatch:

jobs:
  env_and_test:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      max-parallel: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: 'latest'
          activate-environment: flood_adapt
          environment-file: environment.yml

      - name: Install Dependencies
        run: |
          conda init
          conda activate flood_adapt
          pip install .
          conda info
          conda list

      - name: Test
        run: |
          conda init
          conda activate flood_adapt
          pytest tests
